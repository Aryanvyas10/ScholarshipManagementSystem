{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Signup</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .signup-container{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .signup-box{
            width:100%;
            max-width:500px;
        }

        .signup-title{
            text-align:center;
            margin-bottom:25px;
        }

        .signup-title h1{
            font-size:35px;
            margin-bottom:10px;
        }

        .signup-title p{
            opacity:.8;
        }

        .form-footer{
            text-align:center;
            margin-top:20px;
        }

        .form-footer a{
            color:#fff;
            font-weight:600;
        }

        .btn-primary{
            width:100%;
            margin-top:10px;
        }

        input::placeholder{
            color:rgba(255,255,255,.7);
        }


    </style>
</head>
<body>

<div class="signup-container">

    <div class="signup-box form-box">

        <div class="signup-title">
            <h1>Create Account</h1>
            <p>Join our platform today</p>
        </div>

        <form method="POST" action="{% url 'signup' %}" enctype="multipart/form-data">

             {% csrf_token %}


            <div class="form-group">
                <div class="mb-3">

                <label class="form-label">User Name</label>
                <input type="text"
                       placeholder="Enter your user name" name="username" class="form-control"
                       required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email"
                       placeholder="Enter your email" name="email"
                       required>
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel"
                       placeholder="Enter your mobile number" name="mobile"
                       required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password"
                       placeholder="Create password" name="password"
                       required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password"
                       placeholder="Confirm password" name="confirm_password"
                       required>
            </div>

            <div class="form-group">
                <label>Profile Picture (optional)</label>
                <input type="file" name="profile_image" accept="image/*" />
            </div>

            <button type="submit" class="btn-primary">
                Sign Up
            </button>


        </form>

        <div class="form-footer">
            Already have an account?
            <a href="{% url 'signin' %}">Login</a>
        </div>

    </div>

</div>

</body>
</html>
