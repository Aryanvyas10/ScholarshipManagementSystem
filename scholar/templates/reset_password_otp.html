{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        .login-wrapper{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }
        .login-card{
            width:100%;
            max-width:450px;
        }
        .login-title{
            text-align:center;
            margin-bottom:25px;
        }
        .login-title h1{
            font-size:36px;
            font-weight:700;
        }
        .form-control{
            background:rgba(255,255,255,.12);
            border:none;
            color:white;
            padding:14px;
        }
        .form-control:focus{
            background:rgba(255,255,255,.18);
            color:white;
            box-shadow:none;
            border:1px solid rgba(255,255,255,.2);
        }
        .form-control::placeholder{
            color:rgba(255,255,255,.7);
        }
        .btn-primary{
            width:100%;
            padding:14px;
            font-size:16px;
        }
        .login-footer{
            text-align:center;
            margin-top:20px;
        }
        .login-footer a{
            color:white;
            font-weight:600;
            text-decoration:none;
        }
        .alert{
            background:rgba(255,255,255,.10);
            border:1px solid rgba(255,255,255,.25);
            color:white;
        }
    </style>
</head>
<body>

<div class="container login-wrapper">
    <div class="form-box login-card">
        <div class="login-title">
            <h1>Verify OTP</h1>
            <p>Set your new password</p>
        </div>

        {% if message %}
            <div class="alert alert-info" role="alert">{{ message }}</div>
        {% endif %}
        {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'reset_password_otp' %}">
            {% csrf_token %}

            <input type="hidden" name="username" value="{{ username|default:'' }}" />

            <div class="mb-3">
                <label class="form-label">OTP (6 digits)</label>
                <input
                    type="text"
                    class="form-control"
                    placeholder="Enter 6-digit OTP"
                    name="otp"
                    inputmode="numeric"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input
                    type="password"
                    class="form-control"
                    placeholder="Enter new password"
                    name="new_password"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input
                    type="password"
                    class="form-control"
                    placeholder="Confirm new password"
                    name="confirm_password"
                    required>
            </div>

            <button type="submit" class="btn btn-primary">Reset Password</button>
        </form>

        <div class="login-footer">
            <a href="{% url 'forget_password' %}">Back</a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
